<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora de Eficiencia de Producción</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f4f6f9;
    margin:20px;
}

.container{
    max-width:1200px;
    margin:auto;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
    margin-bottom:20px;
}

h1{
    text-align:center;
    color:#333;
}

.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
}

input{
    width:100%;
    padding:8px;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}

button{
    background:#0d6efd;
    color:white;
    border:none;
    border-radius:5px;
    padding:10px 20px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#0b5ed7;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}

th{
    background:#3b68f5;
    color:white;
}

.result{
    color:#2958ff;
    font-weight:bold;
}

.meta{
    color:green;
    font-weight:bold;
}

.resumen{
    font-size:20px;
    font-weight:bold;
}

.nota{
    font-size:13px;
    color:#666;
    margin-top:5px;
}

@media(max-width:768px){

.grid{
    grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div class="container">

<h1>Calculadora de Eficiencia de Producción</h1>

<div class="card">

<div class="grid">

<div>
<label>Jornada Disponible (Minutos)</label>
<input
type="number"
id="jornada"
value="540"
oninput="calcular()">

<div class="nota">
Ejemplo: Jornada de 9 horas = 540 minutos
</div>

</div>

<div>
<label>Personas Disponibles</label>
<input
type="number"
id="personas"
value="10"
oninput="calcular()">
</div>

<div>
<label>Eficiencia Objetivo (%)</label>
<input
type="number"
id="metaEficiencia"
value="100"
oninput="calcular()">
</div>

</div>

</div>

<div class="card">

<div class="grid">

<div>
<label>Cantidad de Estilos</label>
<input
type="number"
id="cantidadEstilos"
value="5"
min="1">
</div>

<div style="display:flex;align-items:flex-end;">
<button onclick="crearTabla()">
Generar Estilos
</button>
</div>

</div>

</div>

<div class="card">

<table>

<thead>

<tr>
<th>Estilo</th>
<th>SMV</th>
<th>Unidades</th>
<th>Eficiencia (%)</th>
<th>Unidades Necesarias</th>
</tr>

</thead>

<tbody id="tabla">

</tbody>

</table>

</div>

<div class="card">

<div class="resumen">
Total Eficiencia:
<span id="total">0.00%</span>
</div>

</div>

</div>

<script>

let cantidadEstilos = 7;

function crearTabla(){

cantidadEstilos =
Number(document.getElementById("cantidadEstilos").value) || 1;

const tabla =
document.getElementById("tabla");

tabla.innerHTML = "";

for(let i=1;i<=cantidadEstilos;i++){

tabla.innerHTML += `
<tr>

<td>Estilo ${i}</td>

<td>
<input
type="number"
step="0.01"
id="smvd${i}"
oninput="calcular()">
</td>

<td>
<input
type="number"
id="uni${i}"
oninput="calcular()">
</td>

<td
class="result"
id="efi${i}">
0.00%
</td>

<td
class="meta"
id="meta${i}">
0
</td>

</tr>
`;

}

calcular();

}

function calcular(){

let jornada =
Number(document.getElementById("jornada").value) || 0;

let personas =
Number(document.getElementById("personas").value) || 0;

let meta =
Number(document.getElementById("metaEficiencia").value) || 0;

let total = 0;

for(let i=1;i<=cantidadEstilos;i++){

const smvInput =
document.getElementById(`smvd${i}`);

const uniInput =
document.getElementById(`uni${i}`);

if(!smvInput || !uniInput){
continue;
}

let smvd =
Number(smvInput.value) || 0;

let unidades =
Number(uniInput.value) || 0;

let eficiencia = 0;

if(jornada > 0 && personas > 0){

eficiencia =
((smvd * unidades) /
(jornada * personas)) * 100;

}

document.getElementById(`efi${i}`).innerText =
eficiencia.toFixed(2) + "%";

total += eficiencia;

let unidadesMeta = 0;

if(smvd > 0){

unidadesMeta =
((jornada * personas) /
smvd) *
(meta / 100);

}

document.getElementById(`meta${i}`).innerText =
Math.ceil(unidadesMeta);

}

document.getElementById("total").innerText =
total.toFixed(2) + "%";

}

crearTabla();

</script>

</body>
</html>
